<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Showcase - SkillPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      background-image:
        radial-gradient(at 0% 0%, rgba(49, 46, 129, 0.2) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(88, 28, 135, 0.2) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(15, 23, 42, 0.2) 0px, transparent 50%);
      background-attachment: fixed;
      background-size: cover;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
    }

    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 10px 15px -3px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      color: #f1f5f9;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary:hover {
      background-color: #4338ca;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
    }

    .form-input {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      color: #f8fafc;
      transition: all 0.2s;
    }

    .form-input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
      outline: none;
      background: rgba(30, 41, 59, 1);
    }
  </style>
</head>

<body data-page="ui" class="text-slate-200 pb-20">


  <!-- Top Bar -->
  <header
    class="flex justify-between items-center bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-10 px-6 py-4 mb-8">
    <h1 class="text-xl font-bold text-white">UI Design System</h1>
    <span
      class="px-3 py-1 bg-indigo-500/10 text-indigo-300 rounded-full text-xs font-bold border border-indigo-500/20">v2.0
      Dark Glass</span>
  </header>

  <!-- Responsive Grid Showcase -->
  <section class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-8">

    <!-- Card Example -->
    <div class="card p-8">
      <div class="absolute top-0 right-0 p-4">
        <span class="h-2 w-2 rounded-full bg-emerald-500 block"></span>
      </div>
      <h2 class="text-lg font-bold text-white mb-2">Standard Card</h2>
      <p class="text-slate-400 mb-4 text-sm">Used for grouping related content. Features soft shadows and rounded
        corners.</p>
      <button class="btn-primary text-sm">Action Button</button>
    </div>

    <!-- Alert Example -->
    <div class="card p-8 border-l-4 border-l-red-500">
      <h2 class="text-lg font-bold text-white mb-2">Alert Card</h2>
      <p class="text-slate-400 mb-4 text-sm">Use border accents to denote state or importance.</p>
      <button class="text-red-400 font-medium text-sm hover:underline">Dismiss</button>
    </div>

    <!-- Info Example -->
    <div class="card p-8 bg-indigo-600 text-white border-none">
      <h2 class="text-lg font-bold mb-2">Primary Surface</h2>
      <p class="text-indigo-100 mb-4 text-sm">Use the primary brand color for high-emphasis areas.</p>
      <div class="w-full bg-indigo-500 h-1 mt-2 rounded-full">
        <div class="bg-white h-full w-2/3 rounded-full"></div>
      </div>
    </div>
  </section>

  <!-- Form Elements -->
  <section class="max-w-6xl mx-auto px-6 mt-12 bg-slate-800/50 p-8 border border-slate-700/50 rounded-xl">
    <h2 class="text-xl font-bold text-white mb-6">Input Components</h2>
    <div class="grid md:grid-cols-2 gap-8">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Text Input</label>
        <input type="text" class="form-input" placeholder="Placeholder text...">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Select Dropdown</label>
        <select class="form-input">
          <option>Option One</option>
          <option>Option Two</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Script -->
  <script src="app.js"></script>

</body>

</html>
